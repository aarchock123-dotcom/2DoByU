<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2DoByU</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#d4a373" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="2DoByU" />
  <link rel="apple-touch-icon" href="icon-192.png" />

  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/components.css" />
</head>
<body>
  <div id="auth-gate" class="hidden"></div>
  <canvas id="fireworks"></canvas>
  <div id="sync-status"></div>

  <div id="app">
    <div id="sidebar-overlay"></div>

    <nav id="sidebar">
      <div class="sidebar-logo">
        <strong>2DoByU</strong>
      </div>
      <ul class="nav-list">
        <li class="nav-item active" data-page="tasks"><span class="nav-icon">☑️</span>Task Board</li>
        <li class="nav-item" data-page="habits"><span class="nav-icon">✓</span>Habits</li>
        <li class="nav-item" data-page="analytics"><span class="nav-icon">📊</span>Analytics</li>
        <li class="nav-item" data-page="insights"><span class="nav-icon">📈</span>Insights</li>
        <li class="nav-item" data-page="notes"><span class="nav-icon">📝</span>Notes</li>
        <li class="nav-item" data-page="calendar"><span class="nav-icon">📅</span>Calendar</li>
      </ul>
      <div class="sidebar-bottom">
        <div class="nav-item" data-page="settings"><span class="nav-icon">⚙️</span>Settings</div>
      </div>
    </nav>

    <div id="topbar">
      <button id="hamburger">☰</button>
      <span id="topbar-title">2DoByU</span>
      <button class="settings-btn" id="search-btn">🔎 Search</button>
      <button id="topbar-action">+ New Task</button>
    </div>

    <main id="main">
      <div class="page active" id="page-tasks"></div>
      <div class="page" id="page-habits"></div>
      <div class="page" id="page-analytics"></div>
      <div class="page" id="page-insights"></div>
      <div class="page" id="page-notes"></div>
      <div class="page" id="page-calendar"></div>
      <div class="page" id="page-settings"></div>
    </main>
  </div>

  <div id="install-banner"></div>

  <div class="modal-overlay" id="task-modal"></div>
  <div class="modal-overlay" id="habit-modal"></div>
  <div class="modal-overlay" id="habit-reflection-modal"></div>
  <div class="modal-overlay" id="note-modal"></div>
  <div class="modal-overlay" id="preview-modal"></div>
  <div class="modal-overlay" id="global-search-modal"></div>

  <div id="focus-timer"></div>
  <div id="quick-add-bar"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
